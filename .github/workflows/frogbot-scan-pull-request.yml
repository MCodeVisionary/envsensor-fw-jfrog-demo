name: "Frogbot Scan Pull Request"
on:
  pull_request_target:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
  security-events: write
  id-token: write

jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    steps:
      - uses: jfrog/frogbot@v3
        with:
          oidc-provider-name: github-docportal
        env:
          JF_URL: https://mcodevisionaryorg.jfrog.io
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
