name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write # required to mint the GitHub OIDC token JFrog exchanges for an access token

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [BOARD_A, BOARD_B]
    steps:
      - uses: actions/checkout@v4

      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Configure
        run: cmake -S . -B build/${{ matrix.board }} -DBOARD=${{ matrix.board }}

      - name: Build
        run: cmake --build build/${{ matrix.board }}

      - name: Unit tests
        run: ctest --test-dir build/${{ matrix.board }} --output-on-failure

      - name: Verify reproducibility
        run: ./scripts/verify_reproducible.sh ${{ matrix.board }}

      # Everything below talks to the JFrog demo instance. Gated to pushes on
      # main (never pull_request, including from forks) both because that's
      # when a publish actually makes sense and because GitHub doesn't grant
      # id-token: write to fork PRs anyway.
      - name: Setup JFrog CLI (OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: setup-jfrog
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: latest
          oidc-provider-name: github-docportal
          custom-server-id: mcodevisionaryorg
          disable-auto-build-publish: true
          disable-auto-evidence-collection: true
        env:
          JF_URL: https://mcodevisionaryorg.jfrog.io

      - name: Verify JFrog connectivity (OIDC health check)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: jf rt ping

      - name: Security scan (secrets, SAST, IaC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: jf audit --secrets --sast --iac --server-id=mcodevisionaryorg

      - name: Publish build-info and populate shared object cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ARTIFACTORY_URL: https://mcodevisionaryorg.jfrog.io/artifactory/
          # Reuse the short-lived OIDC-exchanged token for the ccache proxy's
          # own auth to Artifactory, instead of a long-lived static secret.
          ARTIFACTORY_CCACHE_TOKEN: ${{ steps.setup-jfrog.outputs.oidc-token }}
        run: ./scripts/build.sh ${{ matrix.board }}

      - name: Install evidence signing key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          EVIDENCE_SIGNING_KEY: ${{ secrets.EVIDENCE_SIGNING_KEY }}
        run: |
          mkdir -p evidence-keys
          printf '%s\n' "$EVIDENCE_SIGNING_KEY" > evidence-keys/envsensor-cert.key
          chmod 600 evidence-keys/envsensor-cert.key

      - name: Attach certification evidence
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/certify.sh ${{ matrix.board }} "GitHub Actions CI" "Automated CI Certification"

      - name: Independently verify certification evidence
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          jf evd verify \
            --subject-repo-path "emb-airgap-demo-generic-local/envsensor-fw/${{ matrix.board }}/1.0.0/envsensor_fw" \
            --use-artifactory-keys
